# ===== prod \uD504\uB85C\uD544 (\uC6B4\uC601 \uC11C\uBC84\uC6A9 override) =====
logging.level.root=WARN
logging.level.org.hibernate.engine.jdbc.spi.SqlExceptionHelper=WARN
logging.level.com.chs.springboot.global.redis.LeaderElectionService=INFO
logging.level.com.chs.springboot.domain.binance.service.AggTradeStreamService=INFO

# \uC2A4\uCF00\uC904 \uCF2C
spring.task.scheduling.enabled=true

# \uD154\uB808\uADF8\uB7A8: \uD638\uC2A4\uD2B8\uC5D0\uC11C TELEGRAM_MODE \uB610\uB294 \uAE30\uBCF8 polling
telegram.mode=${TELEGRAM_MODE:polling}

# JPA: \uD504\uB85C\uB355\uC158\uC5D0\uC11C\uB294 \uC2A4\uD0A4\uB9C8 \uBCC0\uACBD \uC548 \uD568
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# devtools \uB054
spring.devtools.restart.enabled=false

# Actuator health \uC0C1\uC138 \uC228\uAE40
management.endpoint.health.show-details=never
