# ===== local \uD504\uB85C\uD544 (\uB85C\uCEEC \uAC1C\uBC1C\uC6A9 override) =====
logging.level.root=INFO
logging.level.org.hibernate.engine.jdbc.spi.SqlExceptionHelper=WARN

# \uC2A4\uCF00\uC904 \uB054 (\uB85C\uCEEC\uC5D0\uC11C \uC2DC\uC7A5/\uC11C\uBC84 \uC911\uBCF5 \uBC29\uC9C0)
#spring.task.scheduling.enabled=false
spring.task.scheduling.enabled=true
# \uD154\uB808\uADF8\uB7A8 \uD3F4\uB9C1 \uB054 (\uB85C\uCEEC\uC5D0\uC11C \uB2F5\uC7A5 \uC911\uBCF5 \uBC29\uC9C0)
#telegram.mode=disabled
telegram.mode=polling
# JPA: \uB85C\uCEEC\uC5D0\uC11C \uC2A4\uD0A4\uB9C8 \uC790\uB3D9 \uBC18\uC601, SQL \uB85C\uADF8 \uCF2C
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# devtools \uD56B\uB9AC\uB85C\uB4DC \uCF2C
spring.devtools.restart.enabled=true

# Actuator health \uC0C1\uC138 \uD45C\uC2DC (\uB514\uBC84\uAE45\uC6A9)
management.endpoint.health.show-details=always

# \uD2F1/\uCCB4\uACB0 DB \uC800\uC7A5 \uB054 (\uB85C\uCEEC+\uD504\uB85C\uB355\uC158 \uAC19\uC740 DB \uC4F8 \uB54C \uC911\uBCF5 \uBC29\uC9C0)
binance.tick-trade.save.enabled=false

# AggTrade Redis enqueue \uBE44\uD65C (\uB85C\uCEEC Redis \uC5F0\uACB0 \uC5D0\uB7EC \uBC29\uC9C0)
binance.agg-trade.save.enabled=false
