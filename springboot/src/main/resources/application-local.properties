# ===== local 프로필 (로컬 개발용 override) =====
logging.level.root=INFO
logging.level.org.hibernate.engine.jdbc.spi.SqlExceptionHelper=WARN

# 스케줄 끔 (로컬에서 시장/서버 중복 방지)
#spring.task.scheduling.enabled=false
spring.task.scheduling.enabled=true
# 텔레그램 폴링 끔 (로컬에서 답장 중복 방지)
#telegram.mode=disabled
telegram.mode=polling
# JPA: 로컬에서 스키마 자동 반영, SQL 로그 끔
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# devtools 핫리로드 끔
spring.devtools.restart.enabled=true

# Actuator health 상세 표시 (디버깅용)
management.endpoint.health.show-details=always

# 틱/체결 DB 저장 끔 (로컬+프로덕션 같은 DB 쓸 때 중복 방지)
binance.tick-trade.save.enabled=false

# AggTrade Redis enqueue 비활 (로컬 Redis 연결 에러 방지)
binance.agg-trade.save.enabled=false

# CORS 허용 origin (로컬 Vite dev server)
cors.allowed-origins=http://localhost:5173,http://localhost:5174,http://121.170.210.60:5173,http://121.170.210.60:5174
