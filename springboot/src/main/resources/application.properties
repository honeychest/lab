# ===== \uACF5\uD1B5 \uC124\uC815 (\uBE44\uBC00\uAC12\uC740 .env + Jasypt) =====
spring.application.name=springboot
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}
spring.devtools.restart.enabled=false
spring.task.scheduling.enabled=${SCHEDULING_ENABLED:true}

# DB (EC2 \uD130\uB110\uB9C1 IP \uB4F1 .env\uC5D0 \uC124\uC815) \u2014 \uC5F0\uACB0\uC815\uBCF4\uB294 hikari prefix \uD558\uC5D0 \uD1B5\uC77C
# DB \uC548\uC815\uC131\uC744 \uC704\uD55C \uCEE4\uB125\uC158 \uD480 \uBD84\uB9AC \uBC0F \uC124\uC815
spring.datasource.hikari.jdbc-url=${DATASOURCE_URL}
spring.datasource.hikari.username=${DATASOURCE_USER}
spring.datasource.hikari.password=${DATASOURCE_PW}
spring.datasource.hikari.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.pool-name=primary-pool
spring.datasource.hikari.maximum-pool-size=4
# 5\uCD08\uC548\uC5D0 \uCEE4\uB125\uC158 \uD68D\uB4DD \uBABB\uD558\uBA74 \uC2E4\uD328
spring.datasource.hikari.connection-timeout=5000
# Mysql wait_timeout \uBCF4\uB2E4 \uC870\uAE08 \uC9E7\uAC8C\uD568 \uAC70\uAE30\uAC00 1\uBD84\uC774\uB2C8\uAE4C \uC5EC\uAE30\uC11C 58\uCD08
spring.datasource.hikari.max-lifetime=58000
# 28\uCD08\uB9C8\uB2E4 \uCEE4\uB125\uC158\uC5D0 select 1 \uAC19\uC740 \uAC00\uBCBC\uC6B4 \uCFFC\uB9AC \uB0A0\uB824\uC11C \uCEE4\uB125\uC158 \uC720\uC9C0 (max-lifetime \uB3D9\uC548 \uB450\uBC88\uD558\uB3C4\uB85D \uC124\uC815\uD574\uBD24\uC74C)
spring.datasource.hikari.keepalive-time=28000

spring.datasource.batch.hikari.jdbc-url=${DATASOURCE_URL}
spring.datasource.batch.hikari.username=${DATASOURCE_USER}
spring.datasource.batch.hikari.password=${DATASOURCE_PW}
spring.datasource.batch.hikari.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.batch.hikari.pool-name=batch-pool
spring.datasource.batch.hikari.maximum-pool-size=6
spring.datasource.batch.hikari.connection-timeout=500
spring.datasource.batch.hikari.max-lifetime=58000
spring.datasource.batch.hikari.keepalive-time=28000

# \uC2A4\uCF00\uC904\uB9C1 \uC2A4\uB808\uB4DC \uC218
spring.task.scheduling.pool.size=10

# JPA (ddl-auto, show-sql \uC740 local/prod \uD504\uB85C\uD544\uC5D0\uC11C override)
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# Swagger
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs

# \uAE30\uC0C1 API
weather.api.service-key=${WEATHER_API_SERVICE_KEY}
weather.api.base-url=${WEATHER_API_BASE_URL}

# \uD154\uB808\uADF8\uB7A8 (mode \uB294 local/prod \uC5D0\uC11C override)
telegram_token=${TELEGRAM_TOKEN}
telegram_chatid=${TELEGRAM_CHATID}
telegram.mode=${TELEGRAM_MODE:polling}
telegram.webhook-secret=${TELEGRAM_WEBHOOK_SECRET:}

# \uBCF4\uC548 API
google.safebrowsing.api-key=${GOOGLE_SAFE_BROWSING_API_KEY}
virustotal.api-key=${VIRUSTOTAL_API_KEY}

# Actuator (show-details \uB294 local/prod \uC5D0\uC11C override)
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# Redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=6379

# RabbitMQ \uC5F0\uACB0\uC774 \uC548 \uB418\uC5B4\uB3C4 \uC804\uCCB4 \uC571 \uC0C1\uD0DC\uB97C 'UP'\uC73C\uB85C \uD45C\uC2DC\uD568
management.health.rabbit.enabled=false

# Kafka
# Docker \uB0B4\uBD80 \uAE30\uBCF8\uAC12. \uB85C\uCEEC \uAC1C\uBC1C\uC740 application-local.properties\uC5D0\uC11C localhost:9094\uB85C override
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
# \uC6D0\uCC9C \uC774\uBCA4\uD2B8 \uC720\uC2E4\uC744 \uC904\uC774\uAE30 \uC704\uD574 leader + ISR ack\uB97C \uBAA8\uB450 \uAE30\uB2E4\uB9BC
spring.kafka.producer.acks=all
# \uC77C\uC2DC\uC801 broker/network \uC624\uB958\uB294 producer \uB808\uBCA8\uC5D0\uC11C \uBA3C\uC800 \uC7AC\uC2DC\uB3C4
spring.kafka.producer.retries=10
# producer retry \uC911 \uC911\uBCF5 \uAE30\uB85D\uC744 \uC904\uC774\uB294 Kafka idempotent producer \uC635\uC158
spring.kafka.producer.properties.enable.idempotence=true
# aggTrade JSON payload \uBC18\uBCF5 \uD544\uB4DC \uC555\uCD95\uC73C\uB85C broker/disk/network \uBD80\uB2F4 \uC644\uD654
spring.kafka.producer.properties.compression.type=lz4
# \uC2E0\uADDC consumer group\uC774 \uAE30\uC874 backlog\uB97C \uCC98\uC74C\uBD80\uD130 \uC77D\uB3C4\uB85D \uC124\uC815
spring.kafka.consumer.auto-offset-reset=earliest
# DB insert \uC131\uACF5 \uD6C4 offset commit\uD558\uB824\uBA74 auto commit\uC744 \uB044\uACE0 listener container\uC5D0\uC11C manual ack\uB97C \uC124\uC815\uD574\uC57C \uD568
spring.kafka.consumer.enable-auto-commit=false

# Kafka consumer group
# - 같은 Kafka topic 을 local/prod 가 함께 볼 때 offset 충돌 막는 용도.
# - local 은 별도 group id 를 써야 prod offset 을 선점하지 않고, 같은 real DB 를 보더라도 먼저 shadow 검증 가능.
kafka.consumer.group-id=raw-writer

# Binance \uD2F1/\uCCB4\uACB0 \uC800\uC7A5 (\uB85C\uCEEC\uC5D0\uC11C \uAC19\uC740 DB \uC4F8 \uB54C false \uB85C override)
binance.tick-trade.save.enabled=true
# RawTick(\uBAA8\uB4E0 \uD2F1) DB \uC800\uC7A5 \u2014 DB \uC6A9\uB7C9 \uC774\uC288\uB85C \uAE30\uBCF8 off, \uD544\uC694 \uC2DC true\uB85C \uBCC0\uACBD
binance.raw-tick.enabled=false
# Binance REST API \uAE30\uBCF8 \uC8FC\uC18C (SPOT, FUTURES \uAC01\uAC01 \uC0AC\uC6A9)
binance.rest.spot.base-url=https://api.binance.com
binance.rest.futures.base-url=https://fapi.binance.com

#flyway \uC124\uC815
spring.flyway.enabled=true
#\uAE30\uC874 DB\uC5D0 \uCC98\uC74C \uC801\uC6A9\uD560 \uB54C \uD604\uC7AC \uC0C1\uD0DC\uB97C V1\uC73C\uB85C \uCC0D\uC5B4\uC90C (\uC774\uAC8C \uD575\uC2EC)
spring.flyway.baseline-on-migrate=true
#\uAE30\uC900 \uBC84\uC804\uC744 1\uB85C \uC124\uC815
spring.flyway.baseline-version=1
#\uB9C8\uC774\uADF8\uB808\uC774\uC158 \uD30C\uC77C \uCC3E\uC744 \uACBD\uB85C
spring.flyway.locations= classpath:db/migration

# admin JWT \uC11C\uBA85\uC6A9 \uBE44\uBC00\uD0A4
admin.jwt.secret=${ADMIN_JWT_SECRET}
# refresh \uD1A0\uD070\uB9CC\uB8CC\uC2DC\uAC04 86400 \uCD08 = 1\uC77C
admin.jwt.access-token-expiration-seconds=${ADMIN_JWT_ACCESS_TOKEN_EXPIRATION_SECONDS:360}
admin.jwt.refresh-token-expiration-seconds=${ADMIN_JWT_REFRESH_TOKEN_EXPIRATION_SECONDS:86400}

# AWS S3
cloud.aws.s3.bucket=${AWS_S3_BUCKET}
cloud.aws.region=${AWS_REGION}
cloud.aws.credentials.access-key=${AWS_ACCESS_KEY_ID}
cloud.aws.credentials.secret-key=${AWS_SECRET_ACCESS_KEY}
# \uC544\uCE74\uC774\uBE59 \uAE30\uC900 (\uC77C)
archive.retention-days=15
