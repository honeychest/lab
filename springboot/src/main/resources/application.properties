# ===== Common =====
spring.application.name=springboot
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}
spring.devtools.restart.enabled=false

# Scheduling
spring.task.scheduling.enabled=${SCHEDULING_ENABLED:true}
spring.task.scheduling.pool.size=10


# ===== Datasource =====
# DB 연결정보는 .env + Jasypt 로 주입한다.
spring.datasource.hikari.jdbc-url=${DATASOURCE_URL}
spring.datasource.hikari.username=${DATASOURCE_USER}
spring.datasource.hikari.password=${DATASOURCE_PW}
spring.datasource.hikari.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.pool-name=primary-pool
spring.datasource.hikari.maximum-pool-size=4
spring.datasource.hikari.connection-timeout=5000
spring.datasource.hikari.max-lifetime=58000
spring.datasource.hikari.keepalive-time=28000

# Batch datasource
spring.datasource.batch.hikari.jdbc-url=${DATASOURCE_URL}
spring.datasource.batch.hikari.username=${DATASOURCE_USER}
spring.datasource.batch.hikari.password=${DATASOURCE_PW}
spring.datasource.batch.hikari.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.batch.hikari.pool-name=batch-pool
spring.datasource.batch.hikari.maximum-pool-size=6
spring.datasource.batch.hikari.minimum-idle=2
spring.datasource.batch.hikari.connection-timeout=5000
spring.datasource.batch.hikari.max-lifetime=58000
spring.datasource.batch.hikari.keepalive-time=28000


# ===== Persistence =====
# JPA
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
spring.flyway.locations=classpath:db/migration


# ===== Infra =====
# Redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=6379

# Actuator
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
management.health.rabbit.enabled=false

# AWS S3
cloud.aws.s3.bucket=${AWS_S3_BUCKET}
cloud.aws.region=${AWS_REGION}
cloud.aws.credentials.access-key=${AWS_ACCESS_KEY_ID}
cloud.aws.credentials.secret-key=${AWS_SECRET_ACCESS_KEY}
archive.retention-days=15


# ===== Kafka =====
# Kafka bootstrap servers
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}

# Producer
# Required broker acknowledgements for producer send
spring.kafka.producer.acks=all
# Producer retry count
spring.kafka.producer.retries=10
# Idempotent producer option
spring.kafka.producer.properties.enable.idempotence=true
# Producer compression codec
spring.kafka.producer.properties.compression.type=lz4

# Consumer
# Offset reset policy for a new consumer group
spring.kafka.consumer.auto-offset-reset=earliest
# Disable auto commit; listener commits manually after successful DB write
spring.kafka.consumer.enable-auto-commit=false

# Max records returned by one poll
spring.kafka.consumer.properties.max.poll.records=500
# Minimum bytes fetched before broker responds
spring.kafka.consumer.properties.fetch.min.bytes=1
# Max broker wait time for fetch.min.bytes
spring.kafka.consumer.properties.fetch.max.wait.ms=500

# Consumer group
# Consumer group id
kafka.consumer.group-id=raw-writer


# ===== API Docs =====
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs


# ===== External APIs =====
# Weather
weather.api.service-key=${WEATHER_API_SERVICE_KEY}
weather.api.base-url=${WEATHER_API_BASE_URL}

# Security APIs
google.safebrowsing.api-key=${GOOGLE_SAFE_BROWSING_API_KEY}
virustotal.api-key=${VIRUSTOTAL_API_KEY}


# ===== Telegram =====
telegram_token=${TELEGRAM_TOKEN}
telegram_chatid=${TELEGRAM_CHATID}
telegram.mode=${TELEGRAM_MODE:polling}
telegram.webhook-secret=${TELEGRAM_WEBHOOK_SECRET:}


# ===== Admin Auth =====
admin.jwt.secret=${ADMIN_JWT_SECRET}
admin.jwt.access-token-expiration-seconds=${ADMIN_JWT_ACCESS_TOKEN_EXPIRATION_SECONDS:360}
admin.jwt.refresh-token-expiration-seconds=${ADMIN_JWT_REFRESH_TOKEN_EXPIRATION_SECONDS:86400}


# ===== Binance =====
# 로컬에서 같은 DB 를 볼 때는 profile override 로 저장을 끈다.
binance.tick-trade.save.enabled=true
binance.raw-tick.enabled=false
binance.rest.spot.base-url=https://api.binance.com
binance.rest.futures.base-url=https://fapi.binance.com
