# ===== 공통 설정 (비밀값은 .env + Jasypt) =====
spring.application.name=springboot
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}
spring.devtools.restart.enabled=false
spring.task.scheduling.enabled=${SCHEDULING_ENABLED:true}

# DB (EC2 터널링 IP 등 .env에 설정)
spring.datasource.url=${DATASOURCE_URL}
spring.datasource.username=${DATASOURCE_USER}
spring.datasource.password=${DATASOURCE_PW}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA (ddl-auto, show-sql 은 local/prod 프로필에서 override)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# Swagger
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs

# 기상 API
weather.api.service-key=${WEATHER_API_SERVICE_KEY}
weather.api.base-url=${WEATHER_API_BASE_URL}

# 텔레그램 (mode 는 local/prod 에서 override)
telegram_token=${TELEGRAM_TOKEN}
telegram_chatid=${TELEGRAM_CHATID}
telegram.mode=${TELEGRAM_MODE:polling}
telegram.webhook-secret=${TELEGRAM_WEBHOOK_SECRET:}

# 보안 API
google.safebrowsing.api-key=${GOOGLE_SAFE_BROWSING_API_KEY}
virustotal.api-key=${VIRUSTOTAL_API_KEY}

# Actuator (show-details 는 local/prod 에서 override)
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# Redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=6379

# Binance 틱/체결 저장 (로컬에서 같은 DB 쓸 때 false 로 override)
binance.tick-trade.save.enabled=true
# Binance REST API 기본 주소 (SPOT, FUTURES 각각 사용)
binance.rest.spot.base-url=https://api.binance.com
binance.rest.futures.base-url=https://fapi.binance.com
# 임계값 변경 허용 IP (쉼표 구분, 비면 모두 허용). 프록시 시 X-Forwarded-For 첫 번째 IP 기준
binance.threshold.allowed-ips=${BINANCE_THRESHOLD_ALLOWED_IPS:121.170.210.60}
